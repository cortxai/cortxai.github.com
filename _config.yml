title: CortxAI
description: Building intelligent systems at the edge of possibility.
baseurl: ""
url: "https://cortxai.github.io"
author: "Phil Budden"

# Build settings
theme: null
markdown: kramdown

# Permalinks
permalink: pretty

# Collections
collections:
  docs:
    output: true
    permalink: /docs/:name/

defaults:
  - scope:
      path: ""
      type: docs
    values:
      layout: docs

# Exclude from build
exclude:
  - .bundle
  - .devcontainer.json
  - .git
  - .gitignore
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - vendor/bundle

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Jekyll settings
encoding: utf-8
